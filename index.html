<!doctype html>
<html lang="es"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>GymLog Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head><body>
<header><h1>💪 GymLog Pro</h1></header>
<main>
<section class="card">
<h2>Nuevo entrenamiento</h2>
<label>Ejercicio</label>
<div class="row">
<input id="search" placeholder="Buscar ejercicio...">
<button id="addBtn">＋ Nuevo</button>
</div>
<select id="exercise" size="8"></select>
<label>Peso (kg)</label><input id="peso" type="number" step="0.5">
<label>Series</label><input id="series" type="number" value="4">
<label>Repeticiones</label><input id="reps" type="number" value="8">
<button id="save">Guardar entrenamiento</button>
</section>
<section class="card"><h2>Historial</h2><div id="hist"></div></section>
</main>
<script src="app.js"></script>
</body></html>
